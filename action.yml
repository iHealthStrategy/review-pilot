name: "ReviewPilot"
description: "AI code review for a pull request using Claude Code (agentic, whole-project context)."
author: "ReviewPilot"
branding:
  icon: "git-pull-request"
  color: "blue"
inputs:
  engine:
    description: "Review engine: claude-agent (recommended) | claude-code | mock"
    required: false
    default: "claude-agent"
  anthropic-api-key:
    description: "Anthropic API key for the Claude engine."
    required: false
  agent-model:
    description: "Model for the claude-agent engine (empty = SDK default)."
    required: false
    default: ""
  insight-file:
    description: "Path to a project-understanding cache file (persist with actions/cache)."
    required: false
    default: ""
  fail-on-severity:
    description: "Fail the check (block merge) when a finding is this severity or worse: info|minor|major|critical. Empty = never fail."
    required: false
    default: ""
  check-run-name:
    description: "Name of the published status check."
    required: false
    default: "ReviewPilot"
  only-changed-lines:
    description: "Keep only findings on lines the PR changed (noise reduction): true|false."
    required: false
    default: "false"
  engine-args:
    description: "Override args for the CLI engine (claude-code), e.g. '-p --output-format text --dangerously-skip-permissions'."
    required: false
    default: ""
  github-token:
    description: "Token for PR comments + check runs and pulling the action image. Pass the workflow github.token."
    required: false
    default: ""
  image:
    description: "Prebuilt action image to run."
    required: false
    default: "ghcr.io/ihealthstrategy/review-pilot-action:v1"

# Composite (not a docker action) so we can authenticate to GHCR before pulling
# the prebuilt image — a `uses: docker://` action can't log in, so private
# images fail to pull. This keeps the image private AND fast (no per-run build).
runs:
  using: "composite"
  steps:
    - name: Log in to GHCR
      shell: bash
      env:
        GHCR_TOKEN: ${{ inputs.github-token }}
      run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

    - name: Run ReviewPilot
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        REVIEW_ENGINE: ${{ inputs.engine }}
        REVIEW_ENGINE_ARGS: ${{ inputs.engine-args }}
        REVIEW_AGENT_MODEL: ${{ inputs.agent-model }}
        FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
        ONLY_CHANGED_LINES: ${{ inputs.only-changed-lines }}
        CHECK_RUN_NAME: ${{ inputs.check-run-name }}
        PROJECT_INSIGHT_FILE: ${{ inputs.insight-file }}
        GH_REPOSITORY: ${{ github.repository }}
        GH_API_URL: ${{ github.api_url }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        IMAGE: ${{ inputs.image }}
      run: |
        if [ -n "$PROJECT_INSIGHT_FILE" ]; then mkdir -p "$(dirname "$PROJECT_INSIGHT_FILE")"; fi
        docker run --rm \
          -e GITHUB_TOKEN -e ANTHROPIC_API_KEY \
          -e REVIEW_ENGINE -e REVIEW_ENGINE_ARGS -e REVIEW_AGENT_MODEL \
          -e FAIL_ON_SEVERITY -e ONLY_CHANGED_LINES -e CHECK_RUN_NAME \
          -e PROJECT_INSIGHT_FILE \
          -e GITHUB_REPOSITORY="$GH_REPOSITORY" \
          -e GITHUB_API_URL="$GH_API_URL" \
          -e PR_NUMBER \
          -e GITHUB_WORKSPACE=/github/workspace \
          -v "${{ github.workspace }}:/github/workspace" \
          -w /github/workspace \
          "$IMAGE"
